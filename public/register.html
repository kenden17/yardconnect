<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — YardConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body class="auth-page">

  <a href="/" class="auth-back">← Back to YardConnect</a>

  <main class="auth-wrap">
    <div class="auth-card">
      <a href="/" class="auth-logo">Yard<span>Connect</span></a>
      <h1 class="auth-title">Create your account</h1>

      <!-- Role picker -->
      <div class="role-picker" id="rolePicker">
        <button type="button" class="role-btn active" data-role="student">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
          I'm a Student
        </button>
        <button type="button" class="role-btn" data-role="homeowner">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          I'm a Homeowner
        </button>
      </div>

      <p class="role-note" id="roleNote">
        🎓 Students must use a school or k12 email address (e.g., you@students.district.k12.tx.us)
      </p>

      <form class="auth-form" id="registerForm" novalidate>
        <input type="hidden" id="roleInput" name="role" value="student" />

        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Your full name" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@school.k12.tx.us" required autocomplete="email" />
          <span class="field-hint" id="emailHint"></span>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" name="password" placeholder="Min 8 chars, 1 uppercase, 1 number" required autocomplete="new-password" />
            <button type="button" class="toggle-pw" aria-label="Toggle password" tabindex="-1">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="pw-strength" id="pwStrength"></div>
        </div>

        <div class="alert alert--error hidden" id="registerError" role="alert"></div>
        <div class="alert alert--success hidden" id="registerSuccess" role="status"></div>

        <button type="submit" class="btn btn--accent btn--full" id="registerBtn">
          Create Account
        </button>
      </form>

      <p class="auth-switch">
        Already have an account? <a href="/login.html">Log in</a>
      </p>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
