<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login — Campus Hands</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body class="auth-page">

  <a href="/" class="auth-back">← Back to Campus Hands</a>

  <main class="auth-wrap">
    <div class="auth-card">
      <a href="/" class="auth-logo">Campus<span>Hands</span></a>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Log in to find tasks and earn.</p>

      <div class="alert alert--success hidden" id="verifiedAlert">
        ✅ Email verified! Logging you in…
      </div>

      <form class="auth-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">School Email</label>
          <input type="email" id="email" placeholder="you@school.edu" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="toggle-pw" aria-label="Toggle password visibility" tabindex="-1">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="alert alert--error hidden" id="loginError" role="alert"></div>

        <button type="submit" class="btn btn--accent btn--full" id="loginBtn">Log In</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="/register.html">Sign up free</a></p>
      <p class="auth-switch" style="margin-top:8px">
        Not a student? <a href="/#post-task">Post a task here</a> — no account needed.
      </p>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
