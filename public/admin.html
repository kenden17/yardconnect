<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Campus Hands</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .admin-wrap { max-width: 1200px; margin: 0 auto; padding: 100px var(--pad-x) 60px; }
    .admin-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:32px; flex-wrap:wrap; gap:16px; }
    .admin-title { font-family:var(--font-display); font-size:clamp(2rem,5vw,3.5rem); }
    .admin-title span { color:var(--accent); }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; margin-bottom:40px; }
    .stat-card { background:var(--mid); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
    .stat-card__num { font-family:var(--font-display); font-size:2.4rem; color:var(--accent); line-height:1; }
    .stat-card__label { font-size:.75rem; text-transform:uppercase; letter-spacing:.1em; color:var(--dim); margin-top:4px; }
    .tab-bar { display:flex; gap:4px; margin-bottom:24px; border-bottom:1px solid var(--border); }
    .tab-btn { padding:10px 20px; font-size:.85rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
               color:var(--dim); border-bottom:3px solid transparent; transition:all .2s; margin-bottom:-1px; }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab-btn:hover { color:var(--white); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .admin-table { width:100%; border-collapse:collapse; font-size:.88rem; }
    .admin-table th { text-align:left; padding:10px 12px; font-size:.72rem; font-weight:700; letter-spacing:.1em;
                      text-transform:uppercase; color:var(--dim); border-bottom:1px solid var(--border); }
    .admin-table td { padding:12px; border-bottom:1px solid rgba(255,255,255,.05); color:var(--white); vertical-align:middle; }
    .admin-table tr:hover td { background:rgba(255,255,255,.02); }
    .table-wrap { overflow-x:auto; background:var(--mid); border:1px solid var(--border); border-radius:var(--radius); }
    .badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:.7rem; font-weight:700; text-transform:uppercase; }
    .badge-open      { background:rgba(34,197,94,.15);  color:#86efac; }
    .badge-assigned  { background:rgba(59,130,246,.15); color:#93c5fd; }
    .badge-completed { background:rgba(245,158,11,.15); color:#fcd34d; }
    .badge-cancelled { background:rgba(239,68,68,.15);  color:#fca5a5; }
  </style>
</head>
<body style="background:var(--black)">
  <header class="nav">
    <a href="/" class="nav__logo">Campus<span>Hands</span></a>
    <span style="font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent)">Admin Panel</span>
    <button class="btn btn--outline btn--sm" id="logoutAdmin">Exit</button>
  </header>

  <div class="admin-wrap">
    <div class="admin-header">
      <h1 class="admin-title">Admin <span>Dashboard</span></h1>
      <div id="lastRefresh" style="font-size:.78rem;color:var(--dim)"></div>
    </div>

    <div class="stat-grid" id="statGrid">
      <div class="stat-card"><div class="stat-card__num">…</div><div class="stat-card__label">Students</div></div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="students">Students</button>
      <button class="tab-btn" data-tab="tasks">Tasks</button>
    </div>

    <div class="tab-panel active" id="tab-students">
      <div class="table-wrap">
        <table class="admin-table" id="usersTable">
          <thead><tr>
            <th>Name</th><th>Email</th><th>Applications</th>
            <th>Completed</th><th>Joined</th><th></th>
          </tr></thead>
          <tbody id="usersBody"><tr><td colspan="6" class="loading-state">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>

    <div class="tab-panel" id="tab-tasks">
      <div class="table-wrap">
        <table class="admin-table" id="tasksTable">
          <thead><tr>
            <th>Title</th><th>Category</th><th>Pay</th><th>City</th>
            <th>Status</th><th>Posted By</th><th>Apps</th><th>Date</th><th></th>
          </tr></thead>
          <tbody id="tasksBody"><tr><td colspan="9" class="loading-state">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const KEY = sessionStorage.getItem('ch_admin_key') ||
                new URLSearchParams(location.search).get('key');

    if (!KEY) { location.href = '/login.html'; }
    else { sessionStorage.setItem('ch_admin_key', KEY); history.replaceState({}, '', '/admin.html'); }

    function escHtml(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function fmt(d) { return d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'; }

    async function api(path, method = 'GET') {
      const r = await fetch('/api/admin' + path, {
        method, headers: { 'x-admin-key': KEY }
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Error');
      return d;
    }

    async function loadStats() {
      const s = await api('/stats');
      document.getElementById('statGrid').innerHTML = `
        <div class="stat-card"><div class="stat-card__num">${s.totalUsers}</div><div class="stat-card__label">Students</div></div>
        <div class="stat-card"><div class="stat-card__num">${s.totalTasks}</div><div class="stat-card__label">Total Tasks</div></div>
        <div class="stat-card"><div class="stat-card__num">${s.openTasks}</div><div class="stat-card__label">Open Tasks</div></div>
        <div class="stat-card"><div class="stat-card__num">${s.completedTasks}</div><div class="stat-card__label">Completed</div></div>
        <div class="stat-card"><div class="stat-card__num">${s.totalApps}</div><div class="stat-card__label">Applications</div></div>
        <div class="stat-card"><div class="stat-card__num">$${Number(s.totalPaid).toFixed(2)}</div><div class="stat-card__label">Paid Out</div></div>
      `;
      document.getElementById('lastRefresh').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
    }

    async function loadUsers() {
      const { users } = await api('/users');
      document.getElementById('usersBody').innerHTML = users.length ? users.map(u => `
        <tr>
          <td><strong>${escHtml(u.name)}</strong></td>
          <td style="color:var(--dim)">${escHtml(u.email)}</td>
          <td>${u.app_count}</td>
          <td>${u.jobs_completed}</td>
          <td style="color:var(--dim)">${fmt(u.created_at)}</td>
          <td>
            <button class="btn btn--danger btn--sm del-user" data-id="${escHtml(u.id)}" data-name="${escHtml(u.name)}">
              Delete
            </button>
          </td>
        </tr>`).join('') : '<tr><td colspan="6" class="empty-state">No students yet.</td></tr>';

      document.querySelectorAll('.del-user').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm(`Delete student "${btn.dataset.name}"? This cannot be undone.`)) return;
          await api('/users/' + btn.dataset.id, 'DELETE');
          loadUsers(); loadStats();
        });
      });
    }

    async function loadTasks() {
      const { tasks } = await api('/tasks');
      document.getElementById('tasksBody').innerHTML = tasks.length ? tasks.map(t => `
        <tr>
          <td><strong>${escHtml(t.title)}</strong></td>
          <td style="color:var(--dim)">${escHtml(t.category)}</td>
          <td style="color:var(--accent)">$${Number(t.pay).toFixed(2)}</td>
          <td style="color:var(--dim)">${escHtml(t.city)}, ${escHtml(t.state)}</td>
          <td><span class="badge badge-${t.status}">${t.status}</span></td>
          <td>${escHtml(t.poster_name)}<br/><span style="font-size:.75rem;color:var(--dim)">${escHtml(t.poster_email)}</span></td>
          <td>${t.app_count}</td>
          <td style="color:var(--dim)">${fmt(t.created_at)}</td>
          <td>
            <button class="btn btn--danger btn--sm del-task" data-id="${escHtml(t.id)}" data-title="${escHtml(t.title)}">
              Delete
            </button>
          </td>
        </tr>`).join('') : '<tr><td colspan="9" class="empty-state">No tasks yet.</td></tr>';

      document.querySelectorAll('.del-task').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm(`Delete task "${btn.dataset.title}"?`)) return;
          await api('/tasks/' + btn.dataset.id, 'DELETE');
          loadTasks(); loadStats();
        });
      });
    }

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    document.getElementById('logoutAdmin').addEventListener('click', () => {
      sessionStorage.removeItem('ch_admin_key');
      location.href = '/';
    });

    // Load everything
    Promise.all([loadStats(), loadUsers(), loadTasks()]).catch(err => {
      if (err.message === 'Unauthorized.') {
        alert('Wrong admin code. Access denied.');
        location.href = '/login.html';
      }
    });
  </script>
</body>
</html>
